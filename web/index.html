<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindustry Sprite DSL Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 12px 20px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    header .subtitle {
      font-size: 12px;
      color: #888;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }

    .panel-header {
      background: #16213e;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
    }

    #editor {
      flex: 1;
      width: 100%;
      background: #0d1117;
      color: #c9d1d9;
      border: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      tab-size: 2;
    }

    #editor:focus {
      outline: none;
    }

    .preview-panel {
      width: 400px;
      display: flex;
      flex-direction: column;
      background: #0d1117;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: repeating-conic-gradient(#2d2d2d 0% 25%, #1d1d1d 0% 50%) 50% / 20px 20px;
    }

    #canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #333;
    }

    .controls {
      padding: 12px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .controls label {
      font-size: 12px;
      color: #888;
    }

    .controls select,
    .controls input {
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #333;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
    }

    .controls button {
      background: #e94560;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #c73e54;
    }

    .status-bar {
      background: #16213e;
      padding: 6px 12px;
      font-size: 12px;
      color: #888;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 16px;
    }

    .status-bar .error {
      color: #e94560;
    }

    .status-bar .success {
      color: #4ecdc4;
    }

    .error-list {
      max-height: 120px;
      overflow-y: auto;
      padding: 8px 12px;
      background: #1a1a2e;
      border-top: 1px solid #0f3460;
      font-size: 12px;
    }

    .error-item {
      padding: 4px 0;
      color: #e94560;
    }

    .error-item span {
      color: #888;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sprite DSL Editor</h1>
    <span class="subtitle">Mindustry Pixel Graphics Generator</span>
  </header>

  <div class="main">
    <div class="editor-panel">
      <div class="panel-header">DSL Code</div>
      <textarea id="editor" spellcheck="false">dsl 1
size 16 16
template unit
palette {
  1 #FF3333
  2 #AA0000
  3 #550000
  4 #FFFFFF
}
series 1 2 3

// 身体
rect 2,3 5,12 1
// 眼睛
rect 3,4 4,5 4
</textarea>
    </div>

    <div class="preview-panel">
      <div class="panel-header">Preview</div>
      <div class="preview-area">
        <canvas id="canvas"></canvas>
      </div>
      <div class="controls">
        <label>Scale:</label>
        <select id="scale">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="4" selected>4x</option>
          <option value="8">8x</option>
          <option value="16">16x</option>
        </select>
        <button id="export">Export PNG</button>
      </div>
      <div id="errors" class="error-list"></div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">Ready</span>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
